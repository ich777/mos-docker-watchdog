name: Compile docker-watchdog

on:
  # Allow to trigger action manually
  workflow_dispatch:
    inputs:
      version:
        description: 'Version'
        required: true
        default: '0.0.1'
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.24.6'
    
    - name: Execute GO tidy
      run: go mod tidy
    
    - name: Build image-sha and create .deb package
      run: |
        BUILDDIR=${{ github.workspace }}
        PACKAGEDIR=$BUILDDIR/docker-watchdog_package
        mkdir -p $PACKAGEDIR/DEBIAN $PACKAGEDIR/usr/bin

        go build -ldflags="-s -w" -o docker-watchdog

        mv $BUILDDIR/docker-watchdog $PACKAGEDIR/usr/bin/docker-watchdog

        cat > $PACKAGEDIR/DEBIAN/control << EOF
        Package: docker-watchdog
        Version: ${{ github.event.inputs.version }}-mos
        Architecture: amd64
        Maintainer: admin@minenet.at
        Description: docker-watchdog for MOS
        EOF

        cd $BUILDDIR
        chmod -R 755 $PACKAGEDIR
        dpkg-deb --build docker-watchdog_package mos-docker-watchdog_${{ github.event.inputs.version }}_amd64.deb
        md5sum $BUILDDIR/mos-docker-watchdog_${{ github.event.inputs.version }}_amd64.deb | awk '{print $1}' > $BUILDDIR/mos-docker-watchdog_${{ github.event.inputs.version }}_amd64.deb.md5
    
    - name: Create Release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: v${{ github.event.inputs.version }}
        release_name: "docker-watchdog v${{ github.event.inputs.version }}"
        body: docker-watchdog for MOS
        draft: false
        prerelease: false

    - name: Upload Release
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ${{ github.workspace }}/mos-docker-watchdog_${{ github.event.inputs.version }}_amd64.deb
        asset_name: mos-docker-watchdog_${{ github.event.inputs.version }}_amd64.deb
        asset_content_type: application/octet-stream

    - name: Upload md5 to Release
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ${{ github.workspace }}/mos-docker-watchdog_${{ github.event.inputs.version }}_amd64.deb.md5
        asset_name: mos-docker-watchdog_${{ github.event.inputs.version }}_amd64.deb.md5
        asset_content_type: text/plain

    - name: Cleanup
      if: always()
      run: rm -rf ${{ github.workspace }}/* ${{ github.workspace }}/.*
